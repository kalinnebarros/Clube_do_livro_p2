<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clube do Livro | Entrar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <header><h1>📚 Clube das Mais Mais</h1></header>
        
        <div id="auth-form" class="auth-box">
            <h2>Criar Conta</h2>
            <input type="text" id="reg-username" placeholder="Nome de Usuário">
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-password" placeholder="Senha">
    
    <button onclick="cadastrar()">Cadastrar e Entrar</button>
    <p>Já tem conta? <a href="#" onclick="alternarTela()">Fazer Login</a></p>
</div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
